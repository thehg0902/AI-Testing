<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title></title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    animation: flashbg 0.4s infinite;
  }

  @keyframes flashbg {
    0%, 49% { background-color: red; }
    50%, 100% { background-color: blue; }
  }

  .container {
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .p1 {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 900;
    font-size: 15vw;
    color: white;
    text-shadow: 0 0 20px black, 0 0 40px black;
    margin: 0;
  }

  .msg {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: 5vw;
    color: white;
    text-shadow: 0 0 15px black, 0 0 30px black;
    margin-top: 1rem;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="container">
    <p class="p1">P1</p>
    <p class="msg">cynthia is 笨蛋</p>
  </div>
</body>
</html>
